# LexCursor local stack: Postgres + Next.js app
#
# Usage:
#   cp .env.example .env          # fill DATABASE_URL + optional Clerk/MCP keys
#   docker compose up --build
#
# App: http://localhost:3000

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lexcursor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lexcursor"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to use the compose Postgres service.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lexcursor
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
